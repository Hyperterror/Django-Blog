{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Hyper's blog</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext">
        <link rel="stylesheet" href="{% static 'css/blog.css' %}">
    </head>
    <body>
        <header class="page-header">
            <nav class="navbar">
                
                <div class="navbar-logo">
                    <h1><a href="{% url 'post_list' %}">Hyper's</a></h1>
                </div>

                <div class="navbar-right">
                    <ul class="navbar-links">
                        <li><a href="{% url 'post_list' %}">BLOG</a></li>
                        <li><a href="/polls">Polls</a></li>
                    </ul>
                    
                    <div class="navbar-profile">
                        <a href="{% url 'profile' %}">
                            {% if user.is_authenticated and user.image and user.image %}
                                <img src="{{ user.image.url }}" alt="Profile picture" class="profile-pic">
                            {% else %}
                                <div class="profile-pic d-flex align-items-center justify-content-center bg-secondary text-white">ME</div>
                            {% endif %}
                        </a>
                    </div>
                </div>

            </nav>
             {% if user.is_authenticated %}
            <div class="container top-menu-btn">
                <a href="{% url 'post_new' %}" class="top-menu btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                    {% include './icons/file-earmark-plus.svg' %}
                </a>
            </div>  
        {% endif %}
        </header>

        <main>
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </main>
    </body>
</html>
